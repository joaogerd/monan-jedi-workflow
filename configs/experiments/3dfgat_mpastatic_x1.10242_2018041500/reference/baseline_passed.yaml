cost function:
  cost type: 3D-FGAT
  time window:
    begin: '2018-04-14T21:00:00Z'
    length: PT6H
  geometry:
    nml_file: "/p/projetos/monan_das/joao.gerd/projects/monan-jedi-workflow/build/runtime/jaci_3dvar_fgat_tutorial_2018041500/2018041500/namelist.atmosphere.outer"
    streams_file: "/p/projetos/monan_das/joao.gerd/projects/monan-jedi-workflow/build/runtime/jaci_3dvar_fgat_tutorial_2018041500/2018041500/streams.atmosphere.outer"
  model:
    name: MPAS
    tstep: PT45M
    model variables: &modvars
    - air_temperature
    - water_vapor_mixing_ratio_wrt_moist_air
    - eastward_wind
    - northward_wind
    - air_pressure_at_surface
    - air_potential_temperature
    - dry_air_density
    - u
    - water_vapor_mixing_ratio_wrt_dry_air
    - air_pressure
    - landmask
    - seaice_fraction
    - snowc
    - skin_temperature_at_surface
    - ivgtyp
    - isltyp
    - cloud_liquid_water
    - cloud_liquid_ice
    - rain_water
    - snow_water
    - graupel
    - pressure_p
    - snowh
    - vegetation_area_fraction
    - eastward_wind_at_10m
    - northward_wind_at_10m
    - lai
    - smois
    - tslb
    - w
  analysis variables: &incvars
  - air_temperature
  - water_vapor_mixing_ratio_wrt_moist_air
  - eastward_wind
  - northward_wind
  - air_pressure_at_surface
  background:
    state variables: *modvars
    filename: "/p/projetos/monan_das/joao.gerd/projects/monan-jedi-workflow/data/background/2018041500/mpasout.2018-04-14_21.00.00.nc"
    date: '2018-04-14T21:00:00Z'
  background error:
    covariance model: MPASstatic
    date: '2018-04-14T21:00:00Z'
  observations:
    observers:
    - obs space:
        name: Radiosonde
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/ufo/testinput_tier_1/sondes_obs_2018041500_m.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/os/obsout_3dfgat_sondes.nc4
        simulated variables: [airTemperature, windEastward, windNorthward, specificHumidity]
      obs operator:
        name: VertInterp
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Background Check
        apply at iterations: 0,1,2
        threshold: 3
    - obs space:
        name: GnssroRefNCEP
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/ufo/testinput_tier_1/gnssro_obs_2018041500_s.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/os/obsout_3dfgat_gnssroref.nc4
        simulated variables: [atmosphericRefractivity]
      obs operator:
        name: GnssroRefNCEP
        obs options:
          use_compress: 0
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: Domain Check
        where:
        - variable:
            name: MetaData/height
          minvalue: 0
          maxvalue: 30000
        - variable:
            name: MetaData/earthRadiusCurvature
          minvalue: 6250000
          maxvalue: 6450000
        - variable:
            name: MetaData/geoidUndulation
          minvalue: -200
          maxvalue: 200
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3
      - filter: ROobserror
        apply at iterations: 0,1
        variable: refractivity
        errmodel: NCEP
    - obs space:
        name: SfcCorrected
        obsdatain:
          engine:
            type: H5File
            obsfile: Data/ufo/testinput_tier_1/sfc_obs_2018041500_m.nc4
        obsdataout:
          engine:
            type: H5File
            obsfile: Data/os/obsout_3dfgat_sfc.nc4
        simulated variables: [stationPressure]
      obs operator:
        name: SfcCorrected
        correction scheme to use: UKMO   # or WRFDA
      linear obs operator:
        name: Identity
        observation alias file: testinput/obsop_name_map.yaml
      obs error:
        covariance model: diagonal
      obs filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Difference Check
        apply at iterations: 0,1
        reference: MetaData/stationElevation
        value: GeoVaLs/height_above_mean_sea_level_at_surface
        threshold: 500
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3
output:
  filename: "Data/states/mpas.3dfgat.$Y-$M-$D_$h.$m.$s.nc"
  stream name: analysis
variational:
  minimizer:
    algorithm: DRPCG
  iterations:
  - geometry:
      nml_file: "/p/projetos/monan_das/joao.gerd/projects/monan-jedi-workflow/build/runtime/jaci_3dvar_fgat_tutorial_2018041500/2018041500/namelist.atmosphere.inner"
      streams_file: "/p/projetos/monan_das/joao.gerd/projects/monan-jedi-workflow/build/runtime/jaci_3dvar_fgat_tutorial_2018041500/2018041500/streams.atmosphere.inner"
    ninner: '10'
    gradient norm reduction: 1e-10
    test: 'on'
# 3D-FGAT can not run multiple outer loops. If activated, 3D-Var will be applied for the 2nd OL.
