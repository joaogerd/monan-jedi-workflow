# Example rendering context for MONAN/JEDI 3DVar-FGAT templates.
#
# This file is intentionally small. It is meant to validate the template-rendering layer, not to
# define a complete scientific experiment.

experiment:
  name: jaci_3dvar_fgat_tutorial_2018041500

cycle:
  yyyymmddhh: "2018041500"
  analysis_iso8601: "2018-04-15T00:00:00Z"
  mpas_file_date: "2018-04-15_00.00.00"
  window:
    begin: "2018-04-14T21:00:00Z"
    length: PT6H

paths:
  analysis_dir: "${MONAN_SCRATCH}/jaci_3dvar_fgat_tutorial_2018041500/analysis"
  background_dir: "${MONAN_SCRATCH}/jaci_3dvar_fgat_tutorial_2018041500/background"
  covariance_dir: "${MONAN_DATA_ROOT}/covariance"
  obs_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500"
  feedback_dir: "${MONAN_SCRATCH}/jaci_3dvar_fgat_tutorial_2018041500/feedback"

mpas:
  outer_namelist: namelist.atmosphere.outer
  outer_streams: streams.atmosphere.outer
  inner_namelist: namelist.atmosphere.inner
  inner_streams: streams.atmosphere.inner

obs:
  aircraft:
    file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
    feedback_file: "${MONAN_SCRATCH}/jaci_3dvar_fgat_tutorial_2018041500/feedback/aircraft_oman_2018041500.h5"
    simulated_variables:
      - airTemperature
      - windEastward
      - windNorthward
      - specificHumidity
  sondes:
    file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
    feedback_file: "${MONAN_SCRATCH}/jaci_3dvar_fgat_tutorial_2018041500/feedback/sondes_oman_2018041500.h5"
    simulated_variables:
      - airTemperature
      - virtualTemperature
      - windEastward
      - windNorthward
      - specificHumidity
  sfc:
    file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"
    feedback_file: "${MONAN_SCRATCH}/jaci_3dvar_fgat_tutorial_2018041500/feedback/sfc_oman_2018041500.h5"
    simulated_variables:
      - stationPressure

jedi:
  member_dir: ""
  analysis_prefix: analysis
  background_prefix: mpasout
  streams_file_member: ""
  obs_perturbations: false
  minimizer: |2
        algorithm: DRIPCG
  iterations: |2
      - <<: *iterationConfig
        ninner: 60
        gradient norm reduction: 1e-3
  analysis_variables:
    - air_temperature
    - water_vapor_mixing_ratio_wrt_moist_air
    - air_pressure_at_surface
    - eastward_wind
    - northward_wind
  state_variables:
    - air_temperature
    - water_vapor_mixing_ratio_wrt_moist_air
    - air_pressure_at_surface
    - eastward_wind
    - northward_wind
  bump_cov_control_variables:
    - air_horizontal_streamfunction
    - air_horizontal_velocity_potential
    - air_temperature
    - water_vapor_mixing_ratio_wrt_moist_air
    - air_pressure_at_surface
  bump_3d_control_variables:
    - air_horizontal_streamfunction
    - air_horizontal_velocity_potential
    - air_temperature
    - water_vapor_mixing_ratio_wrt_moist_air
  bump_2d_control_variables:
    - air_pressure_at_surface
  bump_cov_prefix: mpas
  bump_cov_vbal_prefix: mpas
  bump_cov_dir: "${MONAN_DATA_ROOT}/covariance/NICAS"
  bump_cov_stddev_file: "${MONAN_DATA_ROOT}/covariance/mpas.stddev.nc"
  bump_cov_vbal_dir: "${MONAN_DATA_ROOT}/covariance/VBAL"
  observers: |2
      []
