# MONAN/JEDI 3DVar-FGAT application template.
#
# This is a renderable MONAN-side template, not a direct upstream copy.
# It is derived conceptually from the imported upstream 3DVar template in:
#
#   configs/jedi/applications/3dvar.yaml
#
# Validation status:
#   - suitable for template-rendering tests;
#   - not yet scientifically validated on JACI;
#   - FGAT background-time handling must be confirmed with the selected MPAS-JEDI bundle.

monan metadata:
  experiment: 3dvar_fgat
  analysis date: {{cycle.analysis_iso8601}}
  cycle: {{cycle.yyyymmddhh}}
  time window:
    begin: {{cycle.window.begin}}
    length: {{cycle.window.length}}
  mpas file date: {{cycle.mpas_file_date}}

_iteration: &iterationConfig
  geometry:
    nml_file: {{mpas.inner_namelist}}
    streams_file: {{mpas.inner_streams}}{{jedi.streams_file_member}}
    deallocate non-da fields: {{jedi.deallocate_non_da_fields}}
  gradient norm reduction: 1e-10

output:
  filename: {{paths.analysis_dir}}{{jedi.member_dir}}/{{jedi.analysis_prefix}}.$Y-$M-$D_$h.$m.$s.nc
  stream name: analysis

variational:
  minimizer:
{{jedi.minimizer}}
  iterations:
{{jedi.iterations}}

final:
  diagnostics:
    departures: oman

cost function:
  cost type: 3D-FGAT
  time window:
    begin: {{cycle.window.begin}}
    length: {{cycle.window.length}}
  geometry:
    nml_file: {{mpas.outer_namelist}}
    streams_file: {{mpas.outer_streams}}{{jedi.streams_file_member}}
    deallocate non-da fields: {{jedi.deallocate_non_da_fields}}
  model:
    name: MPAS
    tstep: {{jedi.model_tstep}}
    model variables: &modvars [{{jedi.model_variables}}]
  analysis variables: &incvars [{{jedi.analysis_variables}}]
  background:
    state variables: *modvars
    filename: {{paths.background_dir}}{{jedi.member_dir}}/{{jedi.background_prefix}}.{{cycle.mpas_file_date}}.nc
    date: &backgroundDate {{cycle.background_iso8601}}
  background error:
    covariance model: SABER
    no outer loop update: true
    saber central block:
      saber block name: BUMP_NICAS
      active variables: &ctlvars [{{jedi.bump_cov_control_variables}}]
      read:
        io:
          data directory: {{jedi.bump_cov_dir}}
          files prefix: {{jedi.bump_cov_prefix}}
        drivers:
          multivariate strategy: univariate
          read local nicas: true
        grids:
          - model:
              variables: [{{jedi.bump_3d_control_variables}}]
          - model:
              variables: [{{jedi.bump_2d_control_variables}}]
    saber outer blocks:
    - saber block name: StdDev
      read:
        model file:
          filename: {{jedi.bump_cov_stddev_file}}
          date: *backgroundDate
          stream name: control
    - saber block name: BUMP_VerticalBalance
      read:
        io:
          data directory: {{jedi.bump_cov_vbal_dir}}
          files prefix: {{jedi.bump_cov_vbal_prefix}}
        drivers:
          read local sampling: true
          read vertical balance: true
        vertical balance:
          vbal:
{{jedi.bump_vertical_balance_yaml}}
    linear variable change:
      linear variable change name: {{jedi.linear_variable_change_name}}
      input variables: *ctlvars
      output variables: *incvars
  observations:
    obs perturbations: {{jedi.obs_perturbations}}
    observers:
{{jedi.observers}}
