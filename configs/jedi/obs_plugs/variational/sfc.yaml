# MONAN variational observation plug: sfc
#
# Status: structural skeleton for renderer development.
# This file is not yet a validated JEDI-MPAS observer configuration.

- obs space:
    name: SfcCorrected
    obsdatain:
      engine:
        type: H5File
        obsfile: {{obs.sfc.file}}
    obsdataout:
      engine:
        type: H5File
        obsfile: {{obs.sfc.feedback_file}}
    simulated variables: [{{obs.sfc.simulated_variables}}]
  obs operator:
    name: SfcCorrected
    correction scheme to use: UKMO
  linear obs operator:
    name: Identity
    observation alias file: obsop_name_map.yaml
  obs error:
    covariance model: diagonal
  obs filters:
  - filter: PreQC
    maxvalue: 3
  - filter: Difference Check
    apply at iterations: 0,1
    reference: MetaData/stationElevation
    value: GeoVaLs/height_above_mean_sea_level_at_surface
    threshold: 500
  - filter: Background Check
    apply at iterations: 0,1
    threshold: 3
