# PREPBUFR to IODA-v3 conversion manifest for the 3DVar-FGAT tutorial workflow.
#
# Design reference
# ----------------
# MPAS-Workflow historically used obs2ioda-v2.x followed by IODA upgrades:
#
#   obs2ioda-v2.x <prepbufr>
#   obs2ioda-v2.x -noqc <prepbufr>    # surface replacement
#   ioda-upgrade-v1-to-v2.x ...
#   ioda-upgrade-v2-to-v3.x ...
#
# The MONAN-JEDI build used here provides a native obs2ioda v3 converter. This
# manifest therefore writes IODA-v3 directly and deliberately disables the
# intermediate upgrade stages. The workflow remains agnostic: the executable is
# resolved from OBS2IODA_EXEC or OBS2IODA_BUILD_DIR, and all paths are normalized
# by the conversion driver before execution.

schema_version: 3

experiment:
  name: jaci_3dvar_fgat_tutorial_2018041500
  cycle: "2018041500"

paths:
  prepbufr_dir: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500"
  ioda_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500"
  log_dir: "${MONAN_WORKFLOW_ROOT}/build/logs/obs_conversion"

executables:
  obs2ioda:
    executable_env: OBS2IODA_EXEC
    build_dir_env: OBS2IODA_BUILD_DIR
    default_executable: "obs2ioda_v3.x"

sources:
  prepbufr:
    format: prepbufr
    input_dir: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500"
    file_name: "prepbufr.gdas.20180415.t00z.nr.48h"
    file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.gdas.20180415.t00z.nr.48h"
    description: "GDAS/NCEP PREPBUFR file staged for cycle 2018041500."

# Ordered conversion stages. Native obs2ioda v3 expects absolute input/output
# directories through -i/-o and a BUFR file name as the final positional
# argument. The driver normalizes {input_dir} and {output_dir} with real paths.
stages:
  - name: prepbufr_main_v3
    enabled: true
    kind: command
    executable: obs2ioda
    source: prepbufr
    input_dir: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500"
    output_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500"
    work_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500"
    command:
      - "{obs2ioda}"
      - "-i"
      - "{input_dir}"
      - "-o"
      - "{output_dir}"
      - "{source_file_name}"
    expected_outputs:
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"

  - name: upgrade_ioda_v1_to_v2
    enabled: false
    kind: upgrade_v1_to_v2
    reason: "Disabled because obs2ioda_v3.x writes IODA v3 directly."

  - name: upgrade_ioda_v2_to_v3
    enabled: false
    kind: upgrade_v2_to_v3
    reason: "Disabled because obs2ioda_v3.x writes IODA v3 directly."

# Final products consumed by the JEDI observer plugs and IODA inventory.
observations:
  - name: aircraft
    enabled: true
    source_file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.gdas.20180415.t00z.nr.48h"
    target_file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
    group: aircraft
    description: "Aircraft conventional observations converted directly to IODA v3 from PREPBUFR."

  - name: sondes
    enabled: true
    source_file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.gdas.20180415.t00z.nr.48h"
    target_file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
    group: sondes
    description: "Radiosonde/profile conventional observations converted directly to IODA v3 from PREPBUFR."

  - name: sfc
    enabled: true
    source_file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.gdas.20180415.t00z.nr.48h"
    target_file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"
    group: sfc
    description: "Surface conventional observations converted directly to IODA v3 from PREPBUFR."
