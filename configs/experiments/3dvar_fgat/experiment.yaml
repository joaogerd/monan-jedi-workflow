experiment:
  name: monan_jaci_3dvar_fgat_smoke
  description: "Single-cycle deterministic 3DVar-FGAT smoke test on JACI"
  start_cycle: "2024-08-15T00:00:00Z"
  end_cycle: "2024-08-15T00:00:00Z"
  cycle_interval_hours: 6

assimilation:
  type: 3dvar_fgat
  window_begin: "PT-3H"
  window_length: "PT6H"
  deterministic: true
  use_varbc: false
  use_ensemble: false

forecast:
  enabled: true
  length_hours: 6
  output_interval_hours: 1

mpas:
  mesh: jaci_120km_smoke
  namelist_template: configs/mpas/namelist.atmosphere.template
  streams_template: configs/mpas/streams.atmosphere.template

jedi:
  application_template: configs/jedi/applications/3dvar.yaml
  observations:
    resource: jaci_ioda_offline
  covariance:
    resource: jaci_saber_static_b

site:
  name: jaci
  env_file: configs/sites/jaci/site.env
