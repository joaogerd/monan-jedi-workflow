# Scientific input checklist for the first MONAN/JEDI 3DVar-FGAT experiment.
#
# This checklist documents the real scientific files that must be staged before
# attempting strict runtime preparation or PBS execution.
#
# Status values used here are intentionally descriptive:
#   pending_source       - source file has not yet been identified or staged
#   staged_unvalidated   - file exists but has not been scientifically validated
#   validated_basic      - file passed basic file checks
#   validated_scientific - file was validated for this MPAS/JEDI experiment

scientific_input_checklist:
  experiment: 3dvar_fgat
  cycle: "2024081500"
  external_root: "${MONAN_EXTERNAL_DATA_ROOT}"
  data_root: "${MONAN_DATA_ROOT}"

  inputs:
    - name: background_state
      required: true
      kind: netcdf
      target: "background/2024081500/mpasout.2024-08-15_00.00.00.nc"
      expected_source: "MPAS forecast/background valid at the analysis time"
      current_status: pending_source
      minimal_checks:
        - file exists
        - file is not empty
        - file extension is .nc
        - valid time matches 2024-08-15 00 UTC
        - mesh is compatible with the JEDI geometry
      scientific_notes: >-
        Must be generated by the MPAS/MONAN forecast system or converted from a compatible
        MPAS background. The current workflow does not yet validate NetCDF variables or mesh metadata.

    - name: aircraft_ioda
      required: true
      kind: hdf5
      target: "observations/ioda/2024081500/aircraft_obs_2024081500.h5"
      expected_source: "IODA-converted aircraft observations for the assimilation window"
      current_status: pending_source
      minimal_checks:
        - file exists
        - file is not empty
        - file extension is .h5
        - observation time coverage intersects the 3DVar-FGAT window
        - variables match the aircraft observer plug
      scientific_notes: >-
        Current observer plug is still marked as structural_skeleton. UFO operator and variable names
        must be validated against real IODA contents.

    - name: sondes_ioda
      required: true
      kind: hdf5
      target: "observations/ioda/2024081500/sondes_obs_2024081500.h5"
      expected_source: "IODA-converted radiosonde/profile observations for the assimilation window"
      current_status: pending_source
      minimal_checks:
        - file exists
        - file is not empty
        - file extension is .h5
        - pressure/height coordinates are compatible with vertical interpolation
        - variables match the sondes observer plug
      scientific_notes: >-
        Particular care is needed for humidity variable names, units and vertical coordinate conventions.

    - name: sfc_ioda
      required: true
      kind: hdf5
      target: "observations/ioda/2024081500/sfc_obs_2024081500.h5"
      expected_source: "IODA-converted surface observations for the assimilation window"
      current_status: pending_source
      minimal_checks:
        - file exists
        - file is not empty
        - file extension is .h5
        - station metadata are present
        - variables match the sfc observer plug
      scientific_notes: >-
        Surface pressure correction, station elevation and near-surface variable semantics must be validated.

    - name: covariance_stddev
      required: true
      kind: netcdf
      target: "covariance/mpas.stddev.nc"
      expected_source: "SABER/BUMP covariance resource compatible with selected geometry"
      current_status: pending_source
      minimal_checks:
        - file exists
        - file is not empty
        - file extension is .nc
        - covariance grid/mesh is compatible with the MPAS geometry
      scientific_notes: >-
        Current resource is a placeholder in the structural workflow. Real SABER/BUMP configuration must
        be checked against the MPAS-JEDI build and experiment geometry.

    - name: graph_info_128
      required: false
      kind: text
      target: "graph/graph.info.part.0128"
      expected_source: "MPAS graph partition file for 128 MPI tasks"
      current_status: pending_source
      minimal_checks:
        - file exists if using 128 MPI tasks with a graph partition file
        - partition count matches MPI task count
      scientific_notes: >-
        Required only when the selected MPAS/JEDI execution path expects a graph partition file.

    - name: static_file
      required: false
      kind: netcdf
      target: "static/x1.static.nc"
      expected_source: "MPAS static file matching the experiment mesh"
      current_status: pending_source
      minimal_checks:
        - file exists if required by geometry or model configuration
        - mesh/static fields match background_state geometry
      scientific_notes: >-
        The static file must be consistent with the background and graph partition files.
