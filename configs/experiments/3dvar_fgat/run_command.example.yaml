# Variational command configuration for the MONAN/JEDI 3DVar-FGAT tutorial workflow.

variational_run:
  executable: "${MPASJEDI_VARIATIONAL_EXE}"
  mpi_launcher: "${MPI_LAUNCHER}"
  mpi_tasks_flag: "${MPI_TASKS_FLAG}"
  mpi_tasks: 64
  threads: 1
  work_dir: "build/runtime/jaci_3dvar_fgat_tutorial_2018041500/2018041500"
  yaml: "${MONAN_WORKFLOW_ROOT}/build/rendered/3dvar_fgat.yaml"
  log_file: "logs/mpasjedi_variational.log"

  environment:
    OMP_NUM_THREADS: "1"
    GFORTRAN_CONVERT_UNIT: "big_endian:101-200"
    F_UFMTENDIAN: "big:101-200"

  extra_args: []
