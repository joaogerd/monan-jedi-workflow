# Data layout for the MONAN/JEDI 3DVar-FGAT workflow.
#
# This file defines the directory tree expected by the current structural workflow.
# It creates directories only. It does not create fake scientific files.

data_layout:
  root: "${MONAN_DATA_ROOT}"
  cycle: "2018041500"
  directories:
    # FGAT real uses the background at the beginning of the assimilation window.
    # The local staging path may be a symlink to:
    # ${MONAN_EXTERNAL_DATA_ROOT}/background/2018041418/mpasout.2018-04-14_21.00.00.nc
    - background/2018041500
    - observations/ioda/2018041500
    - covariance
    - covariance/NICAS
    - covariance/VBAL
    - graph
    - static

  expected_files:
    # FGAT real background state. This must be the beginning of the FGAT window,
    # not the central 00Z state used by the smoke-only 3DVar context.
    - name: fgat_background_state_21z
      path: background/2018041500/mpasout.2018-04-14_21.00.00.nc
      external_source: "${MONAN_EXTERNAL_DATA_ROOT}/background/2018041418/mpasout.2018-04-14_21.00.00.nc"
      required_for: 3dvar_fgat_real
      status: staged_from_tutorial_21z

    # Smoke-only 3DVar background state. This must not satisfy FGAT validation.
    - name: smoke_3dvar_background_state_00z
      path: background/2018041500/mpasout.2018-04-15_00.00.00.nc
      required_for: 3dvar_smoke_only
      status: staged_from_tutorial_00z

    # Conventional IODA observations
    - path: observations/ioda/2018041500/aircraft_obs_2018041500.h5
      required_for: aircraft
      status: staged_from_tutorial
    - path: observations/ioda/2018041500/sondes_obs_2018041500.h5
      required_for: sondes
      status: staged_from_tutorial
    - path: observations/ioda/2018041500/sfc_obs_2018041500.h5
      required_for: sfc
      status: staged_from_tutorial

    # Covariance resources
    - path: covariance/mpas.stddev.nc
      required_for: saber_bump
      status: staged_from_tutorial

    # MPAS mesh/static resources
    - path: graph/graph.info.part.0064
      required_for: mpi_layout_64
      status: optional_for_current_smoke
    - path: static/x1.static.nc
      required_for: mpas_static
      status: optional_for_current_smoke
