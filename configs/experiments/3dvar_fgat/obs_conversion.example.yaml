# PREPBUFR to IODA conversion manifest for the 3DVar-FGAT tutorial workflow.
#
# Design reference
# ----------------
# This manifest follows the MPAS-Workflow PrepareObservations mini-workflow:
#
#   GetObs -> ObsToIODA -> ObsReady
#
# In MPAS-Workflow, PREPBUFR conversion is performed by obs2ioda-v2.x. A single
# main call converts the PREPBUFR file and generates multiple IODA outputs
# (aircraft, sondes, sfc, etc.). Surface observations are then regenerated with
# an additional -noqc call and the resulting sfc_obs_<cycle>.h5 replaces the
# surface file generated by the main call. Finally, selected outputs are upgraded
# from IODA v1 -> v2 -> v3 using ioda-upgrade executables.
#
# This MONAN-JEDI manifest keeps that behavior explicit but agnostic: executable
# paths are resolved from environment variables, while the ordered conversion
# stages are declared here.

schema_version: 2

experiment:
  name: jaci_3dvar_fgat_tutorial_2018041500
  cycle: "2018041500"

paths:
  prepbufr_dir: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500"
  ioda_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500"
  log_dir: "${MONAN_WORKFLOW_ROOT}/build/logs/obs_conversion"

executables:
  obs2ioda:
    executable_env: OBS2IODA_EXEC
    build_dir_env: OBS2IODA_BUILD_DIR
    default_executable: "obs2ioda-v2.x"

  ioda_upgrade_v1_to_v2:
    executable_env: IODA_UPGRADE_V1_TO_V2_EXEC
    build_dir_env: IODA_UPGRADE_BUILD_DIR
    default_executable: "ioda-upgrade-v1-to-v2.x"

  ioda_upgrade_v2_to_v3:
    executable_env: IODA_UPGRADE_V2_TO_V3_EXEC
    build_dir_env: IODA_UPGRADE_BUILD_DIR
    default_executable: "ioda-upgrade-v2-to-v3.x"
    config_file: "${MONAN_WORKFLOW_ROOT}/configs/jedi/obsProc/ObsSpaceV2-to-V3.yaml"

sources:
  prepbufr:
    format: prepbufr
    file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.2018041500"
    description: "GDAS/NCEP PREPBUFR file staged for cycle 2018041500."

# Ordered conversion stages. The generic driver expands {source_file},
# {work_dir}, {target_file}, {cycle}, and executable aliases declared above.
stages:
  - name: prepbufr_main
    enabled: true
    kind: command
    executable: obs2ioda
    work_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500"
    source: prepbufr
    command:
      - "{obs2ioda}"
      - "{source_file}"
    expected_outputs:
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"

  - name: prepbufr_surface_noqc
    enabled: true
    kind: command
    executable: obs2ioda
    work_dir: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc"
    source: prepbufr
    command:
      - "{obs2ioda}"
      - "-noqc"
      - "{source_file}"
    expected_outputs:
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc/sfc_obs_2018041500.h5"
    publish:
      - from: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc/sfc_obs_2018041500.h5"
        to: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"
        mode: copy

  - name: upgrade_ioda_v1_to_v2
    enabled: true
    kind: upgrade_v1_to_v2
    executable: ioda_upgrade_v1_to_v2
    inputs:
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"

  - name: upgrade_ioda_v2_to_v3
    enabled: true
    kind: upgrade_v2_to_v3
    executable: ioda_upgrade_v2_to_v3
    config_file: "${MONAN_WORKFLOW_ROOT}/configs/jedi/obsProc/ObsSpaceV2-to-V3.yaml"
    inputs:
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
      - "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"

# Final products consumed by the JEDI observer plugs and IODA inventory.
observations:
  - name: aircraft
    enabled: true
    source_file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.2018041500"
    target_file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/aircraft_obs_2018041500.h5"
    group: aircraft
    description: "Aircraft conventional observations converted from PREPBUFR."

  - name: sondes
    enabled: true
    source_file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.2018041500"
    target_file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sondes_obs_2018041500.h5"
    group: sondes
    description: "Radiosonde/profile conventional observations converted from PREPBUFR."

  - name: sfc
    enabled: true
    source_file: "${MONAN_DATA_ROOT}/observations/prepbufr/2018041500/prepbufr.2018041500"
    target_file: "${MONAN_DATA_ROOT}/observations/ioda/2018041500/sfc_obs_2018041500.h5"
    group: sfc
    description: "Surface conventional observations converted from PREPBUFR using the MPAS-Workflow -noqc replacement pass."
