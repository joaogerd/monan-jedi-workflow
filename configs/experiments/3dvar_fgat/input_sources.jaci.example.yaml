# JACI-specific real input source registry for the first MONAN/JEDI 3DVar-FGAT case.
#
# Copy this file to input_sources.jaci.yaml and fill source_path values with real
# files available on JACI.

input_sources:
  experiment: 3dvar_fgat
  cycle: "2018041500"
  status: jaci_source_discovery

  destinations:
    external_root: "${MONAN_EXTERNAL_DATA_ROOT}"
    staged_root: "${MONAN_DATA_ROOT}"

  sources:
    - name: background_state
      required: true
      kind: netcdf
      source_path: ""
      external_target: "background/2018041500/mpasout.2018-04-15_00.00.00.nc"
      staged_target: "background/2018041500/mpasout.2018-04-15_00.00.00.nc"
      origin_system: MPAS_or_MONAN_forecast
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill with the real MPAS/MONAN background valid at 2018-04-15 00 UTC."

    - name: aircraft_ioda
      required: true
      kind: hdf5
      source_path: ""
      external_target: "observations/ioda/2018041500/aircraft_obs_2018041500.h5"
      staged_target: "observations/ioda/2018041500/aircraft_obs_2018041500.h5"
      origin_system: IODA_conversion_pipeline
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill with the real aircraft IODA file for the selected FGAT window."

    - name: sondes_ioda
      required: true
      kind: hdf5
      source_path: ""
      external_target: "observations/ioda/2018041500/sondes_obs_2018041500.h5"
      staged_target: "observations/ioda/2018041500/sondes_obs_2018041500.h5"
      origin_system: IODA_conversion_pipeline
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill with the real radiosonde/profile IODA file for the selected FGAT window."

    - name: sfc_ioda
      required: true
      kind: hdf5
      source_path: ""
      external_target: "observations/ioda/2018041500/sfc_obs_2018041500.h5"
      staged_target: "observations/ioda/2018041500/sfc_obs_2018041500.h5"
      origin_system: IODA_conversion_pipeline
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill with the real surface IODA file for the selected FGAT window."

    - name: covariance_stddev
      required: true
      kind: netcdf
      source_path: ""
      external_target: "covariance/mpas.stddev.nc"
      staged_target: "covariance/mpas.stddev.nc"
      origin_system: SABER_BUMP_resource_generation
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill with the covariance/stddev resource compatible with the selected mesh."

    - name: graph_info_128
      required: false
      kind: text
      source_path: ""
      external_target: "graph/graph.info.part.0064"
      staged_target: "graph/graph.info.part.0064"
      origin_system: MPAS_mesh_partitioning
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill if the runtime configuration requires a 128-task MPAS graph partition file."

    - name: static_file
      required: false
      kind: netcdf
      source_path: ""
      external_target: "static/x1.static.nc"
      staged_target: "static/x1.static.nc"
      origin_system: MPAS_mesh_static_generation
      owner_or_contact: TODO
      discovery_status: pending
      notes: "Fill if the selected geometry/runtime configuration requires an MPAS static file."

  mpas_jedi_build:
    build_root: "${MPAS_BUNDLE_BUILD}"
    variational_executable: "${MPASJEDI_VARIATIONAL_EXE}"
    discovery_status: pending
    notes: "Update after the real MPAS-JEDI build is available on JACI."
