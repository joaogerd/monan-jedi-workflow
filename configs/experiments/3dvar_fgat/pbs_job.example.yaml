# PBS job rendering context for the MONAN/JEDI 3DVar-FGAT smoke workflow.
#
# This file is a render context for jobs/pbs/3dvar_fgat.pbs.template.
# Values here are conservative placeholders and must be adapted to the real JACI queue/account policy.

pbs:
  job_name: monan_3dvar_fgat
  project: "${MONAN_PROJECT}"
  queue: "${MONAN_QUEUE}"
  walltime: "00:30:00"
  nodes: 1
  ncpus: 64
  mpiprocs: 64
  place: "scatter"
  join_output: "oe"
  log_dir: "build/logs/pbs"

runtime:
  repo_root: "${MONAN_WORKFLOW_ROOT}"
  site_env: "${MONAN_WORKFLOW_ROOT}/configs/sites/jaci/site.env"
  work_dir: "${MONAN_WORKFLOW_ROOT}/build/runtime/jaci_3dvar_fgat_tutorial_2018041500/2018041500"
  yaml_file: "${MONAN_WORKFLOW_ROOT}/build/rendered/3dvar_fgat.yaml"
  mpi_tasks: 64
  omp_num_threads: 1
  oops_trace: 0
  oops_debug: 0
  gfortran_convert_unit: "big_endian:101-200"
  f_ufmtendian: "big:101-200"
  fi_cxi_rx_match_mode: "hybrid"
