observers:
  - name: Radiosonde
    obsdatain:
      obsfile: Data/ufo/testinput_tier_1/sondes_obs_2018041500_m.nc4
    obsdataout:
      obsfile: Data/os/obsout_3dfgat_sondes.nc4
    simulated_variables:
      - airTemperature
      - windEastward
      - windNorthward
      - specificHumidity
    obs_operator:
      name: VertInterp
      observation alias file: testinput/obsop_name_map.yaml
    obs_error:
      covariance_model: diagonal
    obs_filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Background Check
        apply at iterations: 0,1,2
        threshold: 3

  - name: GnssroRefNCEP
    obsdatain:
      obsfile: Data/ufo/testinput_tier_1/gnssro_obs_2018041500_s.nc4
    obsdataout:
      obsfile: Data/os/obsout_3dfgat_gnssroref.nc4
    simulated_variables:
      - atmosphericRefractivity
    obs_operator:
      name: GnssroRefNCEP
      obs options:
        use_compress: 0
    obs_error:
      covariance_model: diagonal
    obs_filters:
      - filter: Domain Check
        where:
          - variable:
              name: MetaData/height
            minvalue: 0
            maxvalue: 30000
          - variable:
              name: MetaData/earthRadiusCurvature
            minvalue: 6250000
            maxvalue: 6450000
          - variable:
              name: MetaData/geoidUndulation
            minvalue: -200
            maxvalue: 200
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3
      - filter: ROobserror
        apply at iterations: 0,1
        variable: refractivity
        errmodel: NCEP

  - name: SfcCorrected
    obsdatain:
      obsfile: Data/ufo/testinput_tier_1/sfc_obs_2018041500_m.nc4
    obsdataout:
      obsfile: Data/os/obsout_3dfgat_sfc.nc4
    simulated_variables:
      - stationPressure
    obs_operator:
      name: SfcCorrected
      correction scheme to use: UKMO
    linear_obs_operator:
      name: Identity
      observation alias file: testinput/obsop_name_map.yaml
    obs_error:
      covariance_model: diagonal
    obs_filters:
      - filter: PreQC
        maxvalue: 3
      - filter: Difference Check
        apply at iterations: 0,1
        reference: MetaData/stationElevation
        value: GeoVaLs/height_above_mean_sea_level_at_surface
        threshold: 500
      - filter: Background Check
        apply at iterations: 0,1
        threshold: 3
