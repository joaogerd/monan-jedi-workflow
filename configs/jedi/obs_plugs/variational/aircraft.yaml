# MONAN variational observation plug: aircraft
#
# Status: structural skeleton for renderer development.
# This file is not yet a validated JEDI-MPAS observer configuration.

- obs space:
    name: Aircraft
    obsdatain:
      engine:
        type: H5File
        obsfile: {{obs.aircraft.file}}
    obsdataout:
      engine:
        type: H5File
        obsfile: {{obs.aircraft.feedback_file}}
    simulated variables: [{{obs.aircraft.simulated_variables}}]
  obs operator:
    name: VertInterp
    observation alias file: obsop_name_map.yaml
  obs error:
    covariance model: diagonal
  obs filters:
  - filter: PreQC
    maxvalue: 3
  - filter: Background Check
    apply at iterations: 0,1
    threshold: 3
